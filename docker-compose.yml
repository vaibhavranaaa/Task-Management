version: "3.9"

services:
  # ── PostgreSQL (User Store) ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager_users}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (Task Store) ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: tm_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: tm_api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MONGODB_URI: mongodb://mongo:27017/taskmanager_tasks
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  pg_data:
  mongo_data:
